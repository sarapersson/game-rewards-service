services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: game_rewards
      POSTGRES_USER: game_rewards
      POSTGRES_PASSWORD: game_rewards_dev_password
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql

  api:
    build:
      context: .
    image: game-rewards-service:local
    environment:
      APP_ENV: local
      SERVICE_NAME: game-rewards-service
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://game_rewards:game_rewards_dev_password@postgres:5432/game_rewards?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    stop_grace_period: 15s

  worker:
    build:
      context: .
    image: game-rewards-service:local
    command: ["/usr/local/bin/worker"]
    environment:
      APP_ENV: local
      SERVICE_NAME: game-rewards-service
      WORKER_ADMIN_ADDR: :8081
      DATABASE_URL: postgres://game_rewards:game_rewards_dev_password@postgres:5432/game_rewards?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:8081:8081"
    stop_grace_period: 15s

volumes:
  postgres_data:
