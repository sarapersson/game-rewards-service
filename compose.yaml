services:
  postgres:
    image: postgres:18.4
    environment:
      POSTGRES_DB: game_rewards
      POSTGRES_USER: game_rewards
      POSTGRES_PASSWORD: game_rewards_dev_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game_rewards -d game_rewards"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
