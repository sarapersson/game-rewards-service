name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_DB: game_rewards
          POSTGRES_USER: game_rewards
          POSTGRES_PASSWORD: game_rewards_dev_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U game_rewards -d game_rewards"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
          --health-start-period 5s

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Run checks
        run: make check

      - name: Run race tests
        run: make test-race

      - name: Verify database migrations
        run: make db-check

      - name: Run integration tests
        run: make test-integration

      - name: Build Docker image
        run: make docker-build
